<form (ngSubmit)="onSubmit()">
  <input [(ngModel)]="car.brand" name="brand" placeholder="Brand" />
  
  <input [(ngModel)]="car.model" name="model" placeholder="Model" />
  
  <input [(ngModel)]="car.year" name="year" type="number" placeholder="Year" />
  
  <input [(ngModel)]="car.image" name="image" placeholder="Image URL" />

  <textarea [(ngModel)]="car.description" name="description" rows="6" placeholder="Description"></textarea>

  <input [(ngModel)]="car.tags" name="tags" placeholder="Tags" />

  <button type="submit">Edit Car</button>
</form>
