<section class="create-car">
  <div class="form-container">
    <h1>Add New Car</h1>

    <form>
      <div class="form-group">
        <label for="brand">Brand</label>
        <input type="text" id="brand" name="brand" placeholder="BMW, Audi..." required>
      </div>

      <div class="form-group">
        <label for="model">Model</label>
        <input type="text" id="model" name="model" placeholder="M3, A4..." required>
      </div>
      <div class="form-group">
        <label for="year">Year</label>
        <input type="number" id="year" name="year" placeholder="2020" required>
      </div>

      <div class="form-group">
        <label for="image">Image URL</label>
        <input type="text" id="image" name="image" placeholder="https://..." required>
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" rows="4" placeholder="Car details..." required></textarea>
      </div>


      <button type="submit" class="btn-submit">Create Car</button>
    </form>
  </div>
</section>
