@if (question(); as q) {
  <div class="details-container">
    <div class="details-card">

      <!-- INFO -->
      <div class="info-section">

        <h1>{{ q.title }}</h1>


        <p class="description">
          {{ q.description }}
        </p>


        <!-- BUTTONS -->
        <div class="actions">

          <button class="btn like">
            ❤️ Like {{ q.likes || 0 }}
          </button>

          <button class="btn comment">
            💬 Comment
          </button>

          <a class="btn back" routerLink="/answers">
            ⬅ Back
          </a>

        </div>

      </div>

    </div>
  </div>
}
